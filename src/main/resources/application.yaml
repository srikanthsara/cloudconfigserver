server:
  port: 8888

spring:
  application:
    name: configserver

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URL:https://github.com/srikanthsara/microservice-config-repo.git}
          default-label: main
          clone-on-start: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}