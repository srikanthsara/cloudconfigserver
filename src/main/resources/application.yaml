server:
  port: 8888

spring:

  application:
    name: configserver

  profiles:
    active: git

  cloud:

    config:

      server:

        git:

          uri: https://github.com/srikanthsara/microservice-config-repo.git
          default-label: main
          clone-on-start: true

management:

  endpoints:

    web:

      exposure:

        include: health,info,refresh

  endpoint:

    health:

      show-details: always

eureka:

  instance:

    prefer-ip-address: true


  client:

    service-url:
      defaultZone:
        http://localhost:8761/eureka/

